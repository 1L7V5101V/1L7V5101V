name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            output/github-contribution-grid-snake.svg
            output/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Deploy to output branch
        run: |
          # Save generated files to temp
          mkdir -p /tmp/snake
          sudo cp output/*.svg /tmp/snake/
          sudo rm -rf output
          # Switch to output branch
          git fetch origin output
          git checkout -b output origin/output 2>/dev/null || git switch output
          # Copy saved files
          cp /tmp/snake/*.svg .
          git add *.svg
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git -c user.name="github-actions[bot]" -c user.email="41898282+github-actions[bot]@users.noreply.github.com" commit -m "chore: update snake animation"
            git push origin output
          fi
